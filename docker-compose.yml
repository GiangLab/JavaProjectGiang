version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: giangdb
      POSTGRES_USER: gianguser
      POSTGRES_PASSWORD: giangpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: giang_app
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/giangdb
      SPRING_DATASOURCE_USERNAME: gianguser
      SPRING_DATASOURCE_PASSWORD: giangpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  pgdata:
